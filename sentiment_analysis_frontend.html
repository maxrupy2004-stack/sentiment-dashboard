<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .input-section {
            grid-column: 1 / -1;
        }

        .input-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
        }

        .result-section {
            grid-column: 1 / -1;
        }

        .result-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
        }

        .sentiment-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sentiment-positive {
            background: #d4edda;
            color: #155724;
        }

        .sentiment-negative {
            background: #f8d7da;
            color: #721c24;
        }

        .sentiment-neutral {
            background: #e2e3e5;
            color: #383d41;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .history-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .history-item p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 768px) {

            .main-content,
            .charts-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>📊 Sentiment Analysis Dashboard</h1>
            <p>Real-time sentiment analysis for text, reviews, and social media</p>
        </header>

        <div class="main-content">
            <!-- Input Section -->
            <div class="card input-section">
                <h2>Analyze Text</h2>
                <div class="error" id="errorMsg"></div>
                <div class="success" id="successMsg"></div>

                <textarea id="textInput" placeholder="Enter text to analyze sentiment..."></textarea>

                <div class="input-controls">
                    <select id="sourceSelect">
                        <option value="general">General</option>
                        <option value="twitter">Twitter/Social Media</option>
                        <option value="review">Product Review</option>
                        <option value="feedback">Customer Feedback</option>
                        <option value="news">News Article</option>
                    </select>
                    <button class="btn-primary" onclick="analyzeSentiment()">Analyze Sentiment</button>
                    <button class="btn-secondary" onclick="clearInput()">Clear</button>
                    <button class="btn-secondary" onclick="loadDashboardStats()">Refresh Stats</button>
                </div>
            </div>

            <!-- Results Section -->
            <div class="card result-section" id="resultsContainer" style="display: none;">
                <h2>Analysis Result</h2>
                <div id="resultContent"></div>
            </div>

            <!-- Statistics Section -->
            <div class="card" id="statsSection" style="display: none;">
                <h2>📈 Overall Statistics</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <!-- History Section -->
            <div class="card" id="historySection" style="display: none;">
                <h2>📝 Recent Analyses</h2>
                <div id="historyContainer"></div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="charts-grid">
            <div class="card">
                <h2>Sentiment Distribution</h2>
                <div class="chart-container">
                    <canvas id="sentimentChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>Sentiment by Source</h2>
                <div class="chart-container">
                    <canvas id="sourceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sentiment-dashboard-mmw3.onrender.com';
        let sentimentChart = null;
        let sourceChart = null;

        // Analyze single text
        async function analyzeSentiment() {
            const text = document.getElementById('textInput').value.trim();
            const source = document.getElementById('sourceSelect').value;

            if (!text) {
                showError('Please enter some text to analyze');
                return;
            }

            try {
                showLoading(true);
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, source })
                });

                if (!response.ok) throw new Error('Analysis failed');
                const result = await response.json();

                displayResult(result);
                showSuccess('Sentiment analyzed successfully!');
                loadDashboardStats();

            } catch (error) {
                showError('Error analyzing sentiment: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // Display result
        function displayResult(result) {
            const container = document.getElementById('resultsContainer');
            const sentimentColor = result.sentiment === 'positive' ? 'positive' :
                result.sentiment === 'negative' ? 'negative' : 'neutral';

            const html = `
                <div class="result-card">
                    <span class="sentiment-badge sentiment-${sentimentColor}">
                        ${result.sentiment.toUpperCase()}
                    </span>
                    <p><strong>Text:</strong> ${escapeHtml(result.text)}</p>
                    <p><strong>Confidence:</strong> ${(result.confidence * 100).toFixed(1)}%</p>
                    <p><strong>Polarity Score:</strong> ${result.polarity_score}</p>
                    <p><strong>Source:</strong> ${result.source}</p>
                    <p><strong>Intensity:</strong> 
                        Positive: ${(result.intensity.positive * 100).toFixed(1)}% | 
                        Negative: ${(result.intensity.negative * 100).toFixed(1)}% | 
                        Neutral: ${(result.intensity.neutral * 100).toFixed(1)}%
                    </p>
                    <p><strong>Time:</strong> ${new Date(result.timestamp).toLocaleString()}</p>
                </div>
            `;

            document.getElementById('resultContent').innerHTML = html;
            container.style.display = 'block';
        }

        // Load dashboard statistics
        async function loadDashboardStats() {
            try {
                const response = await fetch(`${API_URL}/dashboard-stats`);
                if (!response.ok) throw new Error('Failed to fetch stats');
                const stats = await response.json();

                displayStats(stats);
                updateCharts(stats);
                loadHistory();

            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Display statistics
        function displayStats(stats) {
            const container = document.getElementById('statsSection');
            const grid = document.getElementById('statsGrid');

            grid.innerHTML = `
                <div class="stat-box">
                    <h3>${stats.total_analyzed}</h3>
                    <p>Total Analyzed</p>
                </div>
                <div class="stat-box">
                    <h3>${stats.positive_count}</h3>
                    <p>Positive (${stats.positive_percentage}%)</p>
                </div>
                <div class="stat-box">
                    <h3>${stats.negative_count}</h3>
                    <p>Negative (${stats.negative_percentage}%)</p>
                </div>
                <div class="stat-box">
                    <h3>${stats.neutral_count}</h3>
                    <p>Neutral (${stats.neutral_percentage}%)</p>
                </div>
                <div class="stat-box">
                    <h3>${stats.average_sentiment_score.toFixed(2)}</h3>
                    <p>Avg Sentiment Score</p>
                </div>
            `;

            container.style.display = 'block';
        }

        // Update charts
        function updateCharts(stats) {
            // Sentiment Distribution Chart
            if (sentimentChart) sentimentChart.destroy();
            const sentimentCtx = document.getElementById('sentimentChart').getContext('2d');
            sentimentChart = new Chart(sentimentCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Positive', 'Negative', 'Neutral'],
                    datasets: [{
                        data: [stats.positive_count, stats.negative_count, stats.neutral_count],
                        backgroundColor: ['#28a745', '#dc3545', '#6c757d'],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Sentiment by Source Chart
            if (sourceChart) sourceChart.destroy();
            const sourceCtx = document.getElementById('sourceChart').getContext('2d');

            const sources = Object.keys(stats.sentiment_by_source);
            const positiveData = sources.map(s => stats.sentiment_by_source[s].positive);
            const negativeData = sources.map(s => stats.sentiment_by_source[s].negative);
            const neutralData = sources.map(s => stats.sentiment_by_source[s].neutral);

            sourceChart = new Chart(sourceCtx, {
                type: 'bar',
                data: {
                    labels: sources,
                    datasets: [
                        {
                            label: 'Positive',
                            data: positiveData,
                            backgroundColor: '#28a745'
                        },
                        {
                            label: 'Negative',
                            data: negativeData,
                            backgroundColor: '#dc3545'
                        },
                        {
                            label: 'Neutral',
                            data: neutralData,
                            backgroundColor: '#6c757d'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Load analysis history
        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/history?limit=5`);
                if (!response.ok) throw new Error('Failed to fetch history');
                const data = await response.json();

                const container = document.getElementById('historyContainer');
                const section = document.getElementById('historySection');

                if (data.recent.length === 0) {
                    container.innerHTML = '<p>No analysis history yet</p>';
                } else {
                    container.innerHTML = data.recent.map(item => `
                        <div class="history-item">
                            <p><strong>Text:</strong> ${escapeHtml(item.text.substring(0, 100))}${item.text.length > 100 ? '...' : ''}</p>
                            <p><strong>Sentiment:</strong> <span class="sentiment-badge sentiment-${item.sentiment}">${item.sentiment.toUpperCase()}</span></p>
                            <p><strong>Score:</strong> ${item.polarity_score} | <strong>Source:</strong> ${item.source}</p>
                        </div>
                    `).join('');
                }

                section.style.display = 'block';
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        // Helper functions
        function clearInput() {
            document.getElementById('textInput').value = '';
            document.getElementById('resultsContainer').style.display = 'none';
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMsg');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => { successEl.style.display = 'none'; }, 3000);
        }

        function showLoading(show) {
            // You can add a loading spinner here if needed
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load stats on page load
        window.addEventListener('load', loadDashboardStats);

        // Refresh stats every 10 seconds
        setInterval(loadDashboardStats, 10000);
    </script>
</body>

</html>
